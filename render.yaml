services:
  - type: web
    name: seo-kz-platform
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: NODE_ENV
        value: production
databases:
  - name: postgres
    plan: free
    ipAllowList: []
